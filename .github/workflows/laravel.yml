name: CI-CD VirtualWallet AI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    laravel-tests:
        runs-on: ubuntu-latest

        services:
            mongodb:
                image: mongo:latest
                ports:
                    - 27017:27017

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.3"
                  extensions: dom, curl, libxml, mbstring, zip, mongodb
                  tools: composer:v2
                  coverage: none

            - name: Copy Environment File
              run: php -r "file_exists('.env') || copy('.env.example', '.env');"

            - name: Install Dependencies
              run: |
                  composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
                  composer require --dev nunomaduro/larastan --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

            - name: 1.1. Check PHP Security Audit
              run: composer audit || true

            - name: Generate key
              run: php artisan key:generate

            - name: Directory Permissions
              run: chmod -R 777 storage bootstrap/cache

            - name: 1. Check Code Style (Linter)
              run: ./vendor/bin/pint --test

            - name: 2. Static Analysis (Larastan)
              run: ./vendor/bin/phpstan analyse --memory-limit=2G

            - name: 3. Run Automated Tests
              env:
                  DB_CONNECTION: mongodb
                  DB_HOST: 127.0.0.1
                  DB_PORT: 27017
                  DB_DATABASE: testing
              run: php artisan test

            - name: 3.1. Validate Docker Build
              run: docker build -t cleanwallet-ai:test -f Dockerfile .

    deploy:
        needs: laravel-tests
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - name: 4. Trigger Render Deployment via Webhook Hook
              run: |
                  curl -f "${{ secrets.RENDER_DEPLOY_HOOK }}"

            - name: 5. Verify Deployment Health (Smoke Test)
              env:
                  APP_URL: ${{ secrets.RENDER_APP_URL }}
              run: |
                  echo "Waiting 2 minutes for Render build to start..."
                  sleep 120

                  echo "Checking health at $APP_URL..."
                  TIMEOUT=360
                  INTERVAL=20
                  ELAPSED=0

                  while [ $ELAPSED -lt $TIMEOUT ]; do
                    STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$APP_URL/api/ping" || echo "failed")
                    if [ "$STATUS" = "200" ]; then
                      echo "Deployment successful!"
                      exit 0
                    else
                      echo "Status: $STATUS (Waiting... $ELAPSEDs/$TIMEOUTs)"
                    fi
                    sleep $INTERVAL
                    ELAPSED=$((ELAPSED + INTERVAL))
                  done

                  echo "Health check timed out!"
                  exit 1
